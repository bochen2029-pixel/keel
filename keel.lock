# keel.lock — the reproducible substrate KEEL expects.
# Pin hashes when the models/servers are installed. The substrate resolver (kernel::lifecycle)
# reads this to discover/launch/route; a fresh box is provisioned from it. Hashes are the
# reproducibility contract — a run is replayable only against pinned weights.

keel:        { version: 0.2.0, stage: stage0 }   # spec -> stage0 -> stage1 -> stage2 -> stage3

# --- canonical primitives ---------------------------------------------------
# disposition: `embedded` = baked into the binary; `shared` = system asset, download-once.
substrate:
  llm_vision:                                   # brain + eyes (native multimodal, early-fusion)
    id: qwen3.5-9b-q5_k_m
    file: Qwen3.5-9B-Q5_K_M.gguf                 # on-disk model filename under models_dir (id is normalized, not the path)
    mmproj: mmproj-F16                           # llama.cpp serves Qwen vision via this projector file
    mmproj_file: mmproj-F16.gguf                 # on-disk projector filename under models_dir
    sha256: TODO
    mmproj_sha256: TODO
    disposition: shared
    fallbacks: [qwen3.5-4b-q4_k_m]               # smaller-VRAM tier (resolver picks by HardwareProfile)
  audio:                                         # ears (separate organ; transcribes -> text pre-cognition)
    id: whisper-large-v3-turbo
    file: ggml-large-v3-turbo.bin                # on-disk name under servers.models_dir (D1: ears over protocol)
    sha256: TODO
    disposition: shared
    fallback: whisper-base.en                    # faster-than-realtime CPU default
    gate: vad                                    # transcribe only on voiced audio
  embedding:                                     # recall + cheap routing-classification — a Memory organ, NOT a tier
    # C2 DECIDED 2026-07-10 (GOLDEN_RECALL v2, ratified): the MiniLM floor BEAT qwen3-embedding-0.6b
    # as-built (raw-text queries, no instruct prefix) by +0.12 nDCG@10 / +0.12 recall@5, winning every
    # family, 3x faster, better negative separation -> the floor IS the default. Re-open triggers:
    # the Qwen3 instruct-prefix experiment, or a symmetric-hardening set pass. Fingerprint change
    # auto-rebuilds sidecars from the ledger.
    id: all-minilm-l6-v2                           # the "never blind" floor (384-dim, CPU-fast, sovereign-safe)
    file: all-MiniLM-L6-v2-ggml-model-f16.gguf     # on-disk name under servers.models_dir (provisioned byte-exact 2026-07-10)
    port: 8090                                     # the embed llama-server's own port (the LLM owns :8080)
    pooling: mean                                  # model-native pooling (MiniLM = mean; qwen3-embedding = last)
    sha256: TODO
    dim: 384                                       # fingerprinted into the index; mismatch => rebuild-from-ledger
    disposition: shared                            # download-once system asset
    fallback: qwen3-embedding-0.6b-q8              # the 1024-dim upgrade candidate (on disk; C2 re-open flips back)
    sovereign_forces: local                        # I3: sovereign/PHI text never embeds off-box; vectors stay local
    format_committing: true                        # the one substrate exception to tier-interchangeability (ADR #13)
  rerank:                                          # cross-encoder upgrade to Memory's rerank() sub-seam
    id: qwen3-reranker-0.6b-q8
    file: qwen3-reranker-0.6b-q8_0.gguf            # on-disk name under servers.models_dir (C1 bench leg)
    port: 8091                                     # the rerank llama-server's own port (LLM :8080 - embed :8090)
    sha256: TODO
    disposition: shared
    default: identity                              # SHIPS OFF (canon §11) — pass-through until GOLDEN_RECALL earns it on
    # C1 DECIDED 2026-07-10 (GOLDEN_RECALL v2, ratified): identity STAYS - reranker uplift +0.070
    # recall@5 < the 0.10 ratified threshold (nDCG +0.111 recorded; zero regressions; p95 594 ms).
    # KEEL injects top-k wholesale, so presence beats ordering; not worth a third managed server.
    # Re-open triggers: organic recall misses in lived use, or a recall_k=1 usage pattern.
  privacy:                                         # I3 mask, rung 3 — recall verification-pass (NOT the guarantee)
    id: openai-privacy-filter                      # bidirectional token-classifier (BIOES span head), 50M active / ~1.5B total, Apache-2.0
    sha256: TODO
    runtime: onnx                                  # in-process via the Rust `ort` crate (or transformers) — NOT a GGUF, NOT llama.cpp, no server to supervise
    disposition: shared                            # ~1GB weights, download-once (too big to bake in); but runs in-process like the embedder, unlike the server-based LLM/Whisper
    decode: viterbi                                # span-decode is deterministic, app-level, KEEL-owned -> the operating point is a NON-model knob
    default: off                                   # rungs 1-2 (markers+regex) ship Stage 0; model lands Stage 2 behind GOLDEN_PRIVACY
    operating_point: recall                        # = the Viterbi transition-bias: tune toward over-redaction; leak-uncertain => sovereign
    per_cell_finetune: true                        # general PII | medical PHI | code/secrets
    scrub_before_distill: true                     # reversibility gate: no secret fossilized into a LoRA
  store:                                         # the index (the ledger is files, see below)
    engine: sqlite                               # baked into the binary (~1 MB, embeddable)
    vector: sqlite-vec
    disposition: embedded

# --- inference servers (resolver targets) -----------------------------------
servers:
  llama_cpp: { path: "C:\\llama.cpp", exe: llama-server.exe, build: b9627, cuda: "12.4", endpoint: "http://127.0.0.1:8080", launch: managed, prev_build: "C:\\llama.cpp-b8931-april" }
  # ^ updated b8931 -> b9627 on 2026-06-13 (side-by-side; prev build reversible). Validated on Qwen3.5-9B-Q5_K_M: text + reasoning_content + thinking-toggle + vision(mmproj-F16).
  #   Qwen3.5-9B native ctx = 262144 (256K). Plan: KV q8_0 + flash-attn for context headroom (the update's purpose) — validate at managed launch. TurboQuant KV (Google, ICLR'26) NOT in upstream (PR closed 2026-06-03); watch-item, not adopted.
  whisper:   { path: "C:\\whisper.cpp", exe: whisper-cli.exe, mode: "cli|server" }
  models_dir: "C:\\models"

# the substrate resolver tries these in order (use-whatever-exists, then launch, then cloud)
resolver_order:
  - probe_running:  ["http://127.0.0.1:1234/v1", "http://127.0.0.1:11434/v1", "http://127.0.0.1:8080/v1"]  # LM Studio / Ollama / llama-server
  - launch_local:   [llama_cpp, whisper]
  - cloud_tier:     [cheap-API, frontier]
  - embedded_tiny:  [embedding]                  # recall + cheap classification floor (a Memory organ, not a degraded cognition tier)
  - else:           fail   # SUBSTRATE_UNRESOLVED

# --- tiers (the routing economy) --------------------------------------------
# price is $/1M tokens (miss / hit / out); local is electricity, tracked as $0.
# local max_tokens 4096 (A7.5): maintenance turns think (judge/corrector) — a 2048 cap truncated a
# thinking pass mid-reasoning (lived 2026-07-09); 16k ctx has ample headroom.
tiers:
  local:     { adapter: local_llama, model: qwen3.5-9b-q5_k_m, vision: true, price: { miss: 0.0,   hit: 0.0,      out: 0.0  }, max_tokens: 4096, default_effort: { n: 8 } }
  cheap-API: { adapter: deepseek,    model: deepseek-v4-pro,   vision: false, api_key_env: DEEPSEEK_API_KEY, price: { miss: 0.435, hit: 0.003625, out: 0.87 }, max_tokens: 2048, default_effort: { n: 2, thinking: high } }
  frontier:  { adapter: anthropic,   model: claude-opus-4-8,   vision: true,  api_key_env: ANTHROPIC_API_KEY, price: { miss: 5.0,   hit: 0.5,      out: 25.0 }, max_tokens: 2048, default_effort: { n: 1 } }

router:
  default_tier: local
  sovereign_forces: local
  perception_forces: local        # raw frames/audio never egress (I3)
  escalate_after_oracle_failures: 2
  amplify_n: 1                    # B1/§23 verified best-of-N width; 1 = OFF (applies only to local critical/golden-ref'd steps)
  # B1 DECIDED 2026-07-10 (ISSUE-4, pre-registered thresholds): OFF STANDS - pass@8 - pass@1 = +0.115 < the
  # 0.15 bar on the fixed set (pass@1 0.845 rode the 0.85 headroom edge - the set skews easy for the 9B;
  # latency no blocker at p95 225 ms/candidate; logic-family failures resist sampling - a wrong MODE repeats).
  # The kernel loop + this knob + the bench stay built; flip = this line. Re-open triggers: a real cell
  # workload with discriminating oracles (Director schema gates) showing recoverable single-pass failures,
  # a harder set revision, or a weaker local substrate where single-pass reliability drops.

# --- persistence ------------------------------------------------------------
ledger:    { kind: files, dir: ".\\.keelstate", audit: "audit.jsonl", tape: "tape/", traces: "traces/" }   # append-only, lossless, human-readable = system of record
index:     { kind: sqlite, file: ".\\.keelstate\\index.db", derived: true, rebuildable_from: ledger }       # queryable, disposable

# --- invariants (pins for the freeze check) ---------------------------------
golden:     { set_sha256: TODO }   # agent-frozen ground truth; operator-only --update
thresholds: { rework_rate_max: 0.10, cache_hit_min: 0.70, escalation_rate: downward_trend }
